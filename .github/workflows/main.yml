name: Build Mod
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Java 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Make gradlew executable
        run: chmod +x gradlew
      - name: Build
        run: ./gradlew build
      - name: Upload jar
        uses: actions/upload-artifact@v3
        with:
          name: heartbreaksmp-jar
          path: build/libs/*[^sources].jar
